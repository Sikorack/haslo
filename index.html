<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hasło</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --o: #FE560E;
    --o2: #ff7a3d;
    --o3: #ff9a6c;
    --o4: #ff3d00;
    --bg: #0d0a08;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px 20px;
    overflow: hidden;
    position: relative;
    background-image: url('tlo.jpg');
    background-size: cover;
    background-position: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 80% 90%, rgba(254,86,14,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 20% 10%, rgba(254,86,14,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .row {
    display: flex;
    justify-content: center;
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    width: 115px; height: 115px;
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    border: 2px solid #2e1a0e;
    background: #160d06;
    transition: transform .18s ease, box-shadow .18s ease;
    overflow: hidden;
    user-select: none;
    flex-shrink: 0;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 6px 28px rgba(254,86,14,0.30), 0 0 0 1px rgba(254,86,14,0.3);
  }
  .card:active { transform: scale(0.95); }

  .face {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    transition: opacity .2s ease, transform .2s ease;
  }

  /* default */
  .face-default .q {
    font-size: 44px; font-weight: 700;
    color: var(--o);
    text-shadow: 0 0 20px rgba(254,86,14,0.5);
    animation: qpulse 2.5s ease-in-out infinite;
  }
  @keyframes qpulse {
    0%,100% { opacity:.5; transform:scale(1); }
    50% { opacity:1; transform:scale(1.1); }
  }

  /* question */
  .face-question {
    background: linear-gradient(140deg, rgba(254,86,14,0.20), rgba(180,50,0,0.25));
    border: 2px solid rgba(254,86,14,0.5);
    padding: 10px; text-align: center;
    font-size: 12px; font-family: Arial, sans-serif;
    line-height: 1.4; color: #ffb08a;
  }

  /* letter */
  .face-letter {
    background: linear-gradient(140deg, rgba(254,86,14,0.28), rgba(200,60,0,0.38));
    border: 2px solid var(--o);
    box-shadow: inset 0 0 28px rgba(254,86,14,0.2), 0 0 22px rgba(254,86,14,0.4);
  }
  .face-letter .ltr {
    font-size: 58px; font-weight: 700;
    color: #ffcbb0;
    text-shadow: 0 0 16px var(--o), 0 0 40px rgba(254,86,14,0.6);
    animation: ltrin .35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes ltrin {
    0%   { transform:scale(0.2) rotate(-20deg); opacity:0; }
    100% { transform:scale(1) rotate(0); opacity:1; }
  }

  /* state visibility */
  .card[data-state="default"]  .face-question,
  .card[data-state="default"]  .face-letter   { opacity:0; pointer-events:none; transform:scale(0.85); }
  .card[data-state="question"] .face-default,
  .card[data-state="question"] .face-letter   { opacity:0; pointer-events:none; }
  .card[data-state="question"] .face-question { opacity:1; transform:scale(1); }
  .card[data-state="letter"]   .face-default,
  .card[data-state="letter"]   .face-question { opacity:0; pointer-events:none; }
  .card[data-state="letter"]   .face-letter   { opacity:1; transform:scale(1); }

  /* ── BUTTON ── */
  #btn-reveal {
    margin-top: 4px;
    padding: 12px 36px;
    border: none; border-radius: 50px;
    background: var(--o);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(254,86,14,0.45);
    transition: transform .15s, box-shadow .15s, background .15s;
    position: relative; overflow: hidden;
  }
  #btn-reveal::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform .4s ease;
  }
  #btn-reveal:hover { transform: scale(1.06); box-shadow: 0 6px 30px rgba(254,86,14,0.6); }
  #btn-reveal:hover::after { transform: translateX(100%); }
  #btn-reveal:active { transform: scale(0.97); }
  #btn-reveal:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  /* ── PARTICLES ── */
  .particle {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 50;
    animation: pfly var(--d) ease-out forwards;
  }
  .particle.star {
    border-radius: 0;
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  }
  @keyframes pfly {
    0%   { transform:translate(0,0) scale(1) rotate(0deg); opacity:1; }
    100% { transform:translate(var(--tx),var(--ty)) scale(0) rotate(var(--rot)); opacity:0; }
  }

  /* ── CONFETTI strips ── */
  .confetti {
    position: fixed; width: 8px; height: 18px;
    pointer-events: none; z-index: 50; border-radius: 2px;
    animation: cfall var(--d) ease-in forwards;
  }
  @keyframes cfall {
    0%   { transform: translate(var(--sx), var(--sy)) rotate(var(--r0)) scaleX(1); opacity:1; }
    100% { transform: translate(calc(var(--sx) + var(--dx)), calc(var(--sy) + var(--dy))) rotate(var(--r1)) scaleX(0.3); opacity:0; }
  }

  /* ── FLASH ── */
  #flash {
    position:fixed; inset:0; z-index:98;
    pointer-events:none; opacity:0;
  }
  #flash.go { animation: flashanim 3s ease forwards; }
  @keyframes flashanim {
    0%   { opacity:0; background:transparent; }
    6%   { opacity:1; background:radial-gradient(ellipse at center, rgba(255,180,80,.95) 0%, rgba(254,86,14,.7) 40%, transparent 70%); }
    14%  { background:#fff; opacity:1; }
    22%  { background:radial-gradient(ellipse at center, #ffcbb0 0%, rgba(254,86,14,.8) 50%, rgba(0,0,0,.2) 100%); }
    32%  { background:#fff; opacity:.9; }
    44%  { background:radial-gradient(ellipse at 30% 60%, rgba(254,86,14,.5) 0%, transparent 55%); opacity:.8; }
    58%  { background:radial-gradient(ellipse at 70% 40%, rgba(254,86,14,.3) 0%, transparent 55%); opacity:.5; }
    100% { opacity:0; }
  }

  /* ── SHOCKWAVE rings ── */
  .ring {
    position: fixed;
    border-radius: 50%;
    border: 3px solid var(--o);
    pointer-events: none;
    z-index: 49;
    transform: translate(-50%, -50%) scale(0);
    animation: ringout var(--d) ease-out forwards;
  }
  @keyframes ringout {
    0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(var(--s)); opacity:0; }
  }

  @media(max-width:500px) {
    .card { width:86px; height:86px; }
    .face-question { font-size:10.5px; }
    .face-letter .ltr { font-size:44px; }
    #btn-reveal { font-size:15px; padding:10px 28px; }
  }
</style>
</head>
<body>

<div id="flash"></div>

<div class="row" id="row1"></div>
<div class="row" id="row2"></div>
<div class="row" id="row3"></div>

<button id="btn-reveal">⚡ Odkryj wszystkie</button>

<script>
const AUDIO_URL = "piosenka.mp3"; // ← wklej tutaj URL do pliku audio

const data = [
  { letter:"M", question:"Decyzja: szybko czy dokładnie?" },
  { letter:"A", question:"Plan czy działanie?" },
  { letter:"M", question:"Dane czy intuicja?" },
  { letter:"S", question:"Rozwaga czy vabank?" },
  { letter:"U", question:"Tempo czy balans?" },
  { letter:"P", question:"Zespół czy indywidualność?" },
  { letter:"E", question:"Klient: relacja czy wynik?" },
  { letter:"R", question:"Zmiana: szansa czy ryzyko?" },
  { letter:"M", question:"Kontrola czy zaufanie?" },
  { letter:"O", question:"Priorytet: wzrost czy stabilność?" },
  { letter:"C", question:"Technologia czy ludzie?" },
  { letter:"E", question:"Impuls czy strategia?" }
];

const layout = [3, 5, 4];
const rowEls = ["row1","row2","row3"].map(id => document.getElementById(id));
const allCards = [];
let revealed = 0;
let won = false;

// Audio – tworzymy obiekt z góry, żeby przeglądarka nie blokował autoplay
let audio = null;
if (AUDIO_URL) {
  try {
    audio = new Audio(AUDIO_URL);
    audio.volume = 0.85;
    audio.preload = "auto";
  } catch(e) {}
}

function playMusic() {
  if (audio) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }
}

const COLORS = ['#FE560E','#ff7a3d','#ff9a6c','#ff3d00','#ffcbb0','#ffffff','#ffb347','#ff6600'];

function makeCard(item, num) {
  const card = document.createElement("div");
  card.className = "card"; card.dataset.state = "default";

  const fd = document.createElement("div"); fd.className = "face face-default";
  const q = document.createElement("div"); q.className = "q"; q.textContent = num;
  fd.appendChild(q);

  const fq = document.createElement("div"); fq.className = "face face-question";
  fq.textContent = item.question;

  const fl = document.createElement("div"); fl.className = "face face-letter";
  const l = document.createElement("div"); l.className = "ltr"; l.textContent = item.letter;
  fl.appendChild(l);

  card.appendChild(fd); card.appendChild(fq); card.appendChild(fl);

  card.addEventListener("click", () => {
    const s = card.dataset.state;
    if (s === "default") {
      card.dataset.state = "question";
    } else if (s === "question") {
      card.dataset.state = "letter";
      sparks(card, 18);
      revealed++;
      // Muzyka odpala się natychmiast przy ostatniej karcie,
      // zanim jeszcze wejdzie animacja (400ms delay w triggerWin)
      if (revealed >= 12 && !won) playMusic();
      checkWin();
    } else {
      card.dataset.state = "default";
      revealed = Math.max(0, revealed - 1);
    }
  });
  return card;
}

let idx = 0;
layout.forEach((n, ri) => {
  for (let i = 0; i < n; i++) {
    const c = makeCard(data[idx], idx + 1);
    idx++;
    allCards.push(c);
    rowEls[ri].appendChild(c);
  }
});

// Reveal all button
document.getElementById("btn-reveal").addEventListener("click", async () => {
  const btn = document.getElementById("btn-reveal");
  btn.disabled = true;
  // Muzyka odpala się od razu po kliknięciu przycisku,
  // zanim jeszcze karty zaczną się odkrywać
  if (!won) playMusic();
  for (let i = 0; i < allCards.length; i++) {
    const card = allCards[i];
    if (card.dataset.state !== "letter") {
      card.dataset.state = "letter";
      sparks(card, 12);
      if (card.dataset.state === "default" || card.dataset.state === "question") revealed++;
      await sleep(120);
    }
  }
  revealed = 12;
  checkWin();
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function checkWin() {
  if (revealed >= 12 && !won) {
    won = true;
    setTimeout(triggerWin, 400);
  }
}

// ── Sparks on card ──
function sparks(el, count) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "particle" + (Math.random() > 0.7 ? " star" : "");
    const angle = (i/count)*360 + Math.random()*20;
    const dist = 50 + Math.random()*80;
    const sz = 3 + Math.random()*7;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;`
      + `background:${COLORS[~~(Math.random()*COLORS.length)]};`
      + `--tx:${Math.cos(angle*Math.PI/180)*dist}px;`
      + `--ty:${Math.sin(angle*Math.PI/180)*dist}px;`
      + `--rot:${~~(Math.random()*720)}deg;`
      + `--d:${.4+Math.random()*.7}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1300);
  }
}

// ── Shockwave ring ──
function ring(x, y, maxScale, delay, dur) {
  setTimeout(() => {
    const r = document.createElement("div");
    r.className = "ring";
    r.style.cssText = `left:${x}px;top:${y}px;width:100px;height:100px;--s:${maxScale};--d:${dur}s;`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), dur * 1000 + 100);
  }, delay);
}

// ── Confetti burst ──
function confettiBurst(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const c = document.createElement("div");
      c.className = "confetti";
      const sx = Math.random() * window.innerWidth;
      const sy = -20;
      const dx = (Math.random() - 0.5) * 300;
      const dy = window.innerHeight + 40;
      const r0 = Math.random() * 360;
      const r1 = r0 + 360 + Math.random() * 360;
      const d = 1.5 + Math.random() * 2;
      c.style.cssText = `--sx:${sx}px;--sy:${sy}px;--dx:${dx}px;--dy:${dy}px;--r0:${r0}deg;--r1:${r1}deg;--d:${d}s;`
        + `background:${COLORS[~~(Math.random()*COLORS.length)]};`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), d * 1000 + 100);
    }, i * 20);
  }
}

// ── Global particle rain ──
function particleRain(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement("div");
      p.className = "particle" + (Math.random() > 0.6 ? " star" : "");
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const tx = (Math.random() - 0.5) * 600;
      const ty = (Math.random() - 0.5) * 600;
      const sz = 4 + Math.random() * 14;
      p.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;`
        + `background:${COLORS[~~(Math.random()*COLORS.length)]};`
        + `--tx:${tx}px;--ty:${ty}px;--rot:${~~(Math.random()*720)}deg;`
        + `--d:${.8+Math.random()*1.6}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2600);
    }, i * 15);
  }
}

// ── WIN ──
function triggerWin() {
  // Muzyka już gra – NIE odpala jej ponownie tutaj

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  // Flash
  const f = document.getElementById("flash");
  f.classList.add("go");
  setTimeout(() => f.classList.remove("go"), 3200);

  // Rings from center
  [0, 150, 300, 500, 700, 1000].forEach((delay, i) => {
    ring(cx, cy, 12 + i * 3, delay, 1.2 + i * 0.15);
  });

  // Corner rings
  [[0,0],[window.innerWidth,0],[0,window.innerHeight],[window.innerWidth,window.innerHeight]].forEach(([x,y], i) => {
    ring(x, y, 18, 200 + i * 120, 1.5);
  });

  // Massive particle explosion from center
  for (let i = 0; i < 120; i++) {
    setTimeout(() => {
      const p = document.createElement("div");
      p.className = "particle" + (Math.random() > 0.55 ? " star" : "");
      const angle = Math.random() * 360;
      const dist = 100 + Math.random() * 500;
      const sz = 5 + Math.random() * 16;
      p.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;`
        + `background:${COLORS[~~(Math.random()*COLORS.length)]};`
        + `--tx:${Math.cos(angle*Math.PI/180)*dist}px;`
        + `--ty:${Math.sin(angle*Math.PI/180)*dist}px;`
        + `--rot:${~~(Math.random()*1080)}deg;`
        + `--d:${.7+Math.random()*1.4}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2500);
    }, i * 12);
  }

  // Confetti rain
  confettiBurst(120);

  // 2nd wave
  setTimeout(() => {
    particleRain(80);
    confettiBurst(80);
    [cx * 0.5, cx * 1.5].forEach((x, i) => ring(x, cy, 10, i * 100, 1.0));
  }, 600);

  // 3rd wave
  setTimeout(() => {
    particleRain(60);
    confettiBurst(60);
  }, 1400);

  // Card glow pulse
  allCards.forEach((card, i) => {
    setTimeout(() => {
      card.style.transition = "box-shadow .3s ease";
      card.style.boxShadow = "0 0 30px rgba(254,86,14,0.8), 0 0 60px rgba(254,86,14,0.4)";
      setTimeout(() => { card.style.boxShadow = ""; }, 1200);
    }, i * 60);
  });
}
</script>
</body>
</html>
